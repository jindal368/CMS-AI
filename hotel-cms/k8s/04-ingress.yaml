apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hotel-cms-ingress
  namespace: hotel-cms
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with your ACM certificate ARN after creating it
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:ACCOUNT:certificate/CERT_ID
spec:
  rules:
    # Custom domain — public hotel site
    - host: alghanto.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hotel-cms
                port:
                  number: 80
    - host: www.alghanto.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hotel-cms
                port:
                  number: 80
    # CMS admin — accessible via ALB default hostname
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hotel-cms
                port:
                  number: 80
