apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: hotel-cms-secrets
  namespace: hotel-cms
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "hotel-cms/production"
        objectType: "secretsmanager"
        jmesPath:
          - path: ALCMS_DATABASE_URL
            objectAlias: ALCMS_DATABASE_URL
          - path: ALCMS_OPENROUTER_API_KEY
            objectAlias: ALCMS_OPENROUTER_API_KEY
          - path: ALCMS_DB_PASSWORD
            objectAlias: ALCMS_DB_PASSWORD
  secretObjects:
    - secretName: hotel-cms-env
      type: Opaque
      data:
        - objectName: ALCMS_DATABASE_URL
          key: ALCMS_DATABASE_URL
        - objectName: ALCMS_OPENROUTER_API_KEY
          key: ALCMS_OPENROUTER_API_KEY
        - objectName: ALCMS_DB_PASSWORD
          key: ALCMS_DB_PASSWORD
