apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hotel-cms-db-pvc
  namespace: hotel-cms
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hotel-cms-db
  namespace: hotel-cms
spec:
  serviceName: hotel-cms-db
  replicas: 1
  selector:
    matchLabels:
      app: hotel-cms-db
  template:
    metadata:
      labels:
        app: hotel-cms-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "hotel_cms"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hotel-cms-env
                  key: DB_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: hotel-cms-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-cms-db
  namespace: hotel-cms
spec:
  selector:
    app: hotel-cms-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
